version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
    ignore:
      # dtolnay/rust-toolchain uses Rust toolchain versions as tags,
      # not action versions. We pin to the workspace MSRV (see
      # rust-toolchain.toml) deliberately. Toolchain bumps should
      # happen via a coordinated PR that also updates the workspace
      # MSRV and `rust-toolchain.toml`, not a Dependabot bump.
      - dependency-name: dtolnay/rust-toolchain
