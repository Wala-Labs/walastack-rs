[graph]
all-features = true

[advisories]
version = 2
yanked = "warn"

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
  "MPL-2.0",
  # CDLA-Permissive-2.0 is the Linux Foundation's permissive data-license,
  # used by webpki-roots (pulled in transitively by sqlx and reqwest) for
  # the Mozilla CA trust root bundle. Functionally permissive in the same
  # way as MIT/Apache-2.0 for data assets.
  "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards         = "deny"
deny              = []

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
